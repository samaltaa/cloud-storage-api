{% extends "base.html" %}

{% block content %}
<div class="max-w-4xl mx-auto">
    <h2 class="text-3xl font-semibold mb-10 text-center">Select a Category</h2>
    
    <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
        {% for cat in categories %}
        <div 
            hx-get="/category/{{ cat }}" 
            hx-target="body"
            hx-swap="outerHTML"
            hx-push-url="true"
            class="bg-zinc-900 hover:bg-zinc-800 border border-zinc-700 rounded-3xl p-10 text-center cursor-pointer transition-all hover:scale-105 hover:border-cyan-500 group">
            
            <div class="text-6xl mb-6">
                {% if cat == "images" %}🖼️{% elif cat == "notes" %}📝{% elif cat == "datasets" %}📊{% else %}📁{% endif %}
            </div>
            <h3 class="text-2xl font-medium capitalize mb-2">{{ cat }}</h3>
            <p class="text-zinc-400">Browse and upload {{ cat }}</p>
        </div>
        {% endfor %}
    </div>

    <div class="text-center mt-12 text-zinc-500">
        Total files: <span class="font-mono text-cyan-400">{{ total_files }}</span>
    </div>
</div>
{% endblock %}
