{% extends "base.html" %}
{% block title %}{{ filename }} — Player{% endblock %}

{% block content %}
<div class="fade-up">

    <div class="mb-4 sm:mb-6">
        <a href="/category/general"
           hx-get="/category/general"
           hx-target="body"
           hx-swap="outerHTML"
           hx-push-url="true"
           class="btn-ghost text-xs sm:text-sm">← Back</a>
    </div>

    <p class="mono text-zinc-500 text-xs mb-3 truncate">{{ filename }}</p>

    <div id="player-wrap" class="relative bg-black rounded-2xl overflow-hidden select-none"
         style="max-width:960px; margin:0 auto;">

        <video id="vid"
               src="/api/v1/general/{{ filename }}"
               class="w-full block"
               preload="auto"
               playsinline
               crossorigin="anonymous">
        </video>

        <div id="overlay"
             class="absolute inset-0 flex items-center justify-center opacity-0 transition-opacity duration-200 pointer-events-none">
            <div id="overlay-icon" class="text-white text-6xl drop-shadow-lg"></div>
        </div>

        <div id="controls"
             class="absolute bottom-0 left-0 right-0 px-4 pb-4 pt-10
                    bg-gradient-to-t from-black/90 to-transparent
                    transition-opacity duration-300">

            <div class="flex items-center gap-2 mb-3">
                <span id="cur" class="mono text-xs text-zinc-300 w-10 shrink-0">0:00</span>
                <div id="progress-track"
                     class="flex-1 h-1.5 bg-zinc-700 rounded-full relative cursor-pointer group">
                    <div id="progress-buf"
                         class="absolute inset-y-0 left-0 bg-zinc-600 rounded-full"
                         style="width:0%"></div>
                    <div id="progress-fill"
                         class="absolute inset-y-0 left-0 bg-cyan-400 rounded-full"
                         style="width:0%"></div>
                    <div id="progress-thumb"
                         class="absolute top-1/2 -translate-y-1/2 w-3 h-3 bg-white rounded-full shadow
                                opacity-0 group-hover:opacity-100 transition-opacity -translate-x-1/2"
                         style="left:0%"></div>
                </div>
                <span id="dur" class="mono text-xs text-zinc-300 w-10 shrink-0 text-right">0:00</span>
            </div>

            <div class="flex items-center justify-between gap-2">

                <div class="flex items-center gap-1 sm:gap-2">
                    <button id="btn-rewind"
                            class="w-9 h-9 flex items-center justify-center rounded-xl hover:bg-white/10 transition text-white text-sm font-bold"
                            title="Rewind 10s">
                        ↺
                    </button>

                    <button id="btn-play"
                            class="w-10 h-10 flex items-center justify-center rounded-xl bg-cyan-500 hover:bg-cyan-400 transition text-black font-bold text-lg"
                            title="Play / Pause">
                        ▶
                    </button>

                    <button id="btn-forward"
                            class="w-9 h-9 flex items-center justify-center rounded-xl hover:bg-white/10 transition text-white text-sm font-bold"
                            title="Forward 10s">
                        ↻
                    </button>
                </div>

                <div class="flex items-center gap-1 sm:gap-3">
                    <div class="flex items-center gap-1.5">
                        <button id="btn-mute"
                                class="w-8 h-8 flex items-center justify-center rounded-xl hover:bg-white/10 transition text-white text-sm"
                                title="Mute">
                            🔊
                        </button>
                        <input id="volume"
                               type="range" min="0" max="1" step="0.05" value="1"
                               class="w-16 sm:w-24 accent-cyan-400 cursor-pointer">
                    </div>

                    <select id="speed"
                            class="bg-zinc-800 border border-zinc-700 text-zinc-300 text-xs rounded-lg px-2 py-1 cursor-pointer">
                        <option value="0.5">0.5×</option>
                        <option value="0.75">0.75×</option>
                        <option value="1" selected>1×</option>
                        <option value="1.25">1.25×</option>
                        <option value="1.5">1.5×</option>
                        <option value="2">2×</option>
                    </select>

                    <button id="btn-fs"
                            class="w-8 h-8 flex items-center justify-center rounded-xl hover:bg-white/10 transition text-white text-sm"
                            title="Fullscreen">
                        ⛶
                    </button>
                </div>
            </div>
        </div>
    </div>

</div>

<script>
(function () {
    const vid       = document.getElementById("vid");
    const wrap      = document.getElementById("player-wrap");
    const controls  = document.getElementById("controls");
    const overlay   = document.getElementById("overlay");
    const overlayIcon = document.getElementById("overlay-icon");
    const btnPlay   = document.getElementById("btn-play");
    const btnRewind = document.getElementById("btn-rewind");
    const btnFwd    = document.getElementById("btn-forward");
    const btnMute   = document.getElementById("btn-mute");
    const btnFs     = document.getElementById("btn-fs");
    const volSlider = document.getElementById("volume");
    const speedSel  = document.getElementById("speed");
    const curEl     = document.getElementById("cur");
    const durEl     = document.getElementById("dur");
    const track     = document.getElementById("progress-track");
    const fillEl    = document.getElementById("progress-fill");
    const bufEl     = document.getElementById("progress-buf");
    const thumbEl   = document.getElementById("progress-thumb");

    let hideTimer, overlayTimer, scrubbing = false, ready = false;

    function fmt(s) {
        if (!isFinite(s) || s < 0) return "0:00";
        s = Math.floor(s);
        const h   = Math.floor(s / 3600);
        const m   = Math.floor((s % 3600) / 60);
        const sec = String(s % 60).padStart(2, "0");
        return h > 0 ? h + ":" + String(m).padStart(2, "0") + ":" + sec : m + ":" + sec;
    }

    function flash(icon) {
        overlayIcon.textContent = icon;
        overlay.style.opacity = "1";
        clearTimeout(overlayTimer);
        overlayTimer = setTimeout(() => { overlay.style.opacity = "0"; }, 700);
    }

    function showControls() {
        controls.style.opacity = "1";
        clearTimeout(hideTimer);
        if (!vid.paused) hideTimer = setTimeout(() => { controls.style.opacity = "0"; }, 2500);
    }

    wrap.addEventListener("mousemove", showControls);
    wrap.addEventListener("touchstart", showControls, { passive: true });

    vid.addEventListener("loadedmetadata", function () {
        ready = true;
        durEl.textContent = fmt(vid.duration);
    });

    vid.addEventListener("play",  function () { btnPlay.textContent = "⏸"; showControls(); });
    vid.addEventListener("pause", function () {
        btnPlay.textContent = "▶";
        controls.style.opacity = "1";
        clearTimeout(hideTimer);
    });

    vid.addEventListener("timeupdate", function () {
        if (!ready || scrubbing) return;
        const pct = vid.currentTime / vid.duration * 100;
        fillEl.style.width = pct + "%";
        thumbEl.style.left = pct + "%";
        curEl.textContent  = fmt(vid.currentTime);
    });

    vid.addEventListener("progress", function () {
        if (!ready) return;
        for (let i = 0; i < vid.buffered.length; i++) {
            if (vid.buffered.start(i) <= vid.currentTime && vid.currentTime <= vid.buffered.end(i)) {
                bufEl.style.width = (vid.buffered.end(i) / vid.duration * 100) + "%";
            }
        }
    });

    vid.addEventListener("click", function () {
        if (vid.paused) { vid.play(); flash("▶"); }
        else            { vid.pause(); flash("⏸"); }
    });

    btnPlay.addEventListener("click", function (e) {
        e.stopPropagation();
        if (vid.paused) { vid.play(); }
        else            { vid.pause(); }
    });

    btnRewind.addEventListener("click", function (e) {
        e.stopPropagation();
        if (!ready) return;
        var t = vid.currentTime - 10;
        vid.currentTime = t < 0 ? 0 : t;
        flash("↺ 10s");
    });

    btnFwd.addEventListener("click", function (e) {
        e.stopPropagation();
        if (!ready) return;
        var t = vid.currentTime + 10;
        vid.currentTime = t > vid.duration ? vid.duration : t;
        flash("10s ↻");
    });

    track.addEventListener("mousedown", function (e) {
        e.stopPropagation();
        if (!ready) return;
        scrubbing = true;
        var rect = track.getBoundingClientRect();
        var pct  = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
        vid.currentTime = pct * vid.duration;
        fillEl.style.width = (pct * 100) + "%";
        thumbEl.style.left = (pct * 100) + "%";
    });

    document.addEventListener("mousemove", function (e) {
        if (!scrubbing || !ready) return;
        var rect = track.getBoundingClientRect();
        var pct  = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
        vid.currentTime = pct * vid.duration;
        fillEl.style.width = (pct * 100) + "%";
        thumbEl.style.left = (pct * 100) + "%";
        curEl.textContent  = fmt(vid.currentTime);
    });

    document.addEventListener("mouseup", function () { scrubbing = false; });

    track.addEventListener("touchstart", function (e) {
        e.stopPropagation();
        if (!ready) return;
        scrubbing = true;
        var rect = track.getBoundingClientRect();
        var pct  = Math.max(0, Math.min(1, (e.touches[0].clientX - rect.left) / rect.width));
        vid.currentTime = pct * vid.duration;
        fillEl.style.width = (pct * 100) + "%";
        thumbEl.style.left = (pct * 100) + "%";
    }, { passive: true });

    document.addEventListener("touchmove", function (e) {
        if (!scrubbing || !ready) return;
        var rect = track.getBoundingClientRect();
        var pct  = Math.max(0, Math.min(1, (e.touches[0].clientX - rect.left) / rect.width));
        vid.currentTime = pct * vid.duration;
        fillEl.style.width = (pct * 100) + "%";
        thumbEl.style.left = (pct * 100) + "%";
        curEl.textContent  = fmt(vid.currentTime);
    }, { passive: true });

    document.addEventListener("touchend", function () { scrubbing = false; });

    volSlider.addEventListener("input", function () {
        vid.volume = parseFloat(volSlider.value);
        vid.muted  = vid.volume === 0;
        btnMute.textContent = vid.muted ? "🔇" : "🔊";
    });

    btnMute.addEventListener("click", function (e) {
        e.stopPropagation();
        vid.muted = !vid.muted;
        btnMute.textContent = vid.muted ? "🔇" : "🔊";
        volSlider.value = vid.muted ? 0 : vid.volume;
    });

    speedSel.addEventListener("change", function () {
        vid.playbackRate = parseFloat(speedSel.value);
    });

    btnFs.addEventListener("click", function (e) {
        e.stopPropagation();
        if (!document.fullscreenElement) wrap.requestFullscreen();
        else document.exitFullscreen();
    });

    document.addEventListener("keydown", function (e) {
        if (e.target.tagName === "INPUT" || e.target.tagName === "SELECT") return;
        if (e.code === "Space")      { e.preventDefault(); btnPlay.click(); }
        if (e.code === "ArrowLeft")  { e.preventDefault(); btnRewind.click(); }
        if (e.code === "ArrowRight") { e.preventDefault(); btnFwd.click(); }
        if (e.code === "ArrowUp")    { e.preventDefault(); vid.volume = Math.min(1, vid.volume + 0.1); volSlider.value = vid.volume; }
        if (e.code === "ArrowDown")  { e.preventDefault(); vid.volume = Math.max(0, vid.volume - 0.1); volSlider.value = vid.volume; }
        if (e.code === "KeyM")       { btnMute.click(); }
        if (e.code === "KeyF")       { btnFs.click(); }
    });
})();
</script>
{% endblock %}
