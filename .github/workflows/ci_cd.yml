name: Restart Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh

      - name: Connect to Tailscale
        run: |
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Verify Tailscale Connectivity
        run: |
          tailscale status
          ping -c 2 ${{ secrets.SSH_HOST }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          timeout: 60s
          script: |
            set -e

            cd ${{ secrets.APP_DIR }}

            echo "Pulling latest code..."
            git fetch --all
            git reset --hard origin/main

            echo "Activating virtualenv..."
            source venv/bin/activate

            echo "Installing dependencies..."
            pip install -r requirements.txt --quiet

            echo "Reloading systemd..."
            sudo systemctl daemon-reload

            echo "Restarting service..."
            sudo systemctl restart ${{ secrets.SYSTEMD_SERVICE }}

            echo "Checking service..."
            sudo systemctl is-active ${{ secrets.SYSTEMD_SERVICE }}

            echo "Recent logs:"
            sudo journalctl -u ${{ secrets.SYSTEMD_SERVICE }} -n 20 --no-pager