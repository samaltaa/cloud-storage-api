name: Restart Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Tailscale
        run: curl -fsSL https://tailscale.com/install.sh | sh

      - name: Connect to Tailscale
        run: sudo tailscale up --authkey="${{ secrets.TAILSCALE_AUTHKEY }}"

      - name: Verify Tailscale Connectivity
        run: ping -c 2 ${{ secrets.SSH_HOST }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          timeout: 60s
          script: |
            set -e

            cd ${{ secrets.APP_DIR }}

            git fetch --all
            git reset --hard origin/main

            source venv/bin/activate
            pip install -r requirements.txt --quiet

            sudo -n /usr/bin/systemctl daemon-reload
            sudo -n /usr/bin/systemctl restart ${{ secrets.SYSTEMD_SERVICE }}
            sudo -n /usr/bin/systemctl is-active ${{ secrets.SYSTEMD_SERVICE }}

            sudo -n /usr/bin/journalctl -u ${{ secrets.SYSTEMD_SERVICE }} -n 20 --no-pager